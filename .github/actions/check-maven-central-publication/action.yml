name: Check Maven Central publication status
description: Resolves whether the current release artifact has already been published to Maven Central.

inputs:
  version:
    description: Version to check in Maven Central.
    required: true

outputs:
  published:
    description: Whether the artifact is already published.
    value: ${{ steps.check.outputs.published }}

runs:
  using: composite
  steps:
    - id: check
      shell: bash
      run: |
        set -euo pipefail

        artifact_group_id="$(mvn --batch-mode help:evaluate -Dexpression=project.groupId -q -DforceStdout)"
        artifact_id="$(mvn --batch-mode help:evaluate -Dexpression=project.artifactId -q -DforceStdout)"
        artifact_version="${{ inputs.version }}"
        artifact_path="${artifact_group_id//./\/}/${artifact_id}/${artifact_version}/${artifact_id}-${artifact_version}.pom"
        artifact_url="https://repo1.maven.org/maven2/${artifact_path}"

        if curl -fsI --retry 3 --retry-delay 5 --retry-all-errors "$artifact_url" >/dev/null; then
          echo "Artifact ${artifact_group_id}:${artifact_id}:${artifact_version} is already published to Maven Central."
          echo "published=true" >> "$GITHUB_OUTPUT"
        else
          echo "Artifact ${artifact_group_id}:${artifact_id}:${artifact_version} is not yet published to Maven Central."
          echo "published=false" >> "$GITHUB_OUTPUT"
        fi