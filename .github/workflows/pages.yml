name: Pages

on:
  push:
    branches: [master]
  workflow_run:
    workflows: [CD]
    types: [completed]
  workflow_dispatch:

jobs:
  deploy:
    if: ${{ github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          java-version: "21"
          distribution: temurin
          cache: maven

      - name: Prepare docs directory
        run: |
          set -euo pipefail
          mkdir -p "${RUNNER_TEMP}/docs"

      - name: Build docs for latest
        run: |
          set -euo pipefail
          mvn clean site -DskipTests -q
          cp -r target/site "${RUNNER_TEMP}/docs/latest"

      - name: Build docs for SemVer tags
        shell: bash
        run: |
          set -euo pipefail
          TAGS=$(git tag | grep -E '^v[0-9]+(\.[0-9]+)+$' | sort -V -r || true)
          echo "Found tags: $TAGS"

          # preserve current ref (branch or commit) and ensure we restore it
          ORIG_REF=$(git rev-parse --abbrev-ref HEAD 2>/dev/null || true)
          if [ -z "$ORIG_REF" ] || [ "$ORIG_REF" = "HEAD" ]
          then
            ORIG_REF=$(git rev-parse HEAD)
          fi
          trap 'git checkout "$ORIG_REF" >/dev/null 2>&1 || true' EXIT

          # iterate tags with a for-loop (one-per-line)
          IFS=$'\n'
          for tag in $TAGS
          do
            [ -z "$tag" ] && continue
            echo "Building docs for tag: $tag"
            git checkout "$tag"
            mvn clean site -DskipTests -q
            cp -r target/site "${RUNNER_TEMP}/docs/${tag}"
          done
          unset IFS

      - name: Generate documentation index
        env:
          DOCS_DIR: ${{ runner.temp }}/docs
        run: . .github/scripts/generate-docs-index.bash

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ runner.temp }}/docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
